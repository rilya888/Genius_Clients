name: Deploy Railway (Per Service Branch)

on:
  push:
    branches:
      - deploy/web
      - deploy/api
      - deploy/bot
      - deploy/worker
  workflow_dispatch:
    inputs:
      target:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - web
          - api
          - bot
          - worker

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT: ${{ vars.RAILWAY_ENVIRONMENT }}
      RAILWAY_SERVICE_WEB: ${{ vars.RAILWAY_SERVICE_WEB }}
      RAILWAY_SERVICE_API: ${{ vars.RAILWAY_SERVICE_API }}
      RAILWAY_SERVICE_BOT: ${{ vars.RAILWAY_SERVICE_BOT }}
      RAILWAY_SERVICE_WORKER: ${{ vars.RAILWAY_SERVICE_WORKER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve target service
        id: target
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TARGET="${{ github.event.inputs.target }}"
          else
            BRANCH="${GITHUB_REF_NAME}"
            case "$BRANCH" in
              "deploy/web") TARGET="web" ;;
              "deploy/api") TARGET="api" ;;
              "deploy/bot") TARGET="bot" ;;
              "deploy/worker") TARGET="worker" ;;
              *)
                echo "Unsupported branch: $BRANCH" >&2
                exit 1
                ;;
            esac
          fi

          case "$TARGET" in
            "web")
              SERVICE_ID="${RAILWAY_SERVICE_WEB}"
              DOCKERFILE_PATH="apps/web/Dockerfile"
              ;;
            "api")
              SERVICE_ID="${RAILWAY_SERVICE_API}"
              DOCKERFILE_PATH="apps/api/Dockerfile"
              ;;
            "bot")
              SERVICE_ID="${RAILWAY_SERVICE_BOT}"
              DOCKERFILE_PATH="apps/bot/Dockerfile"
              ;;
            "worker")
              SERVICE_ID="${RAILWAY_SERVICE_WORKER}"
              DOCKERFILE_PATH="apps/worker/Dockerfile"
              ;;
            *)
              echo "Unsupported target: $TARGET" >&2
              exit 1
              ;;
          esac

          if [[ -z "${RAILWAY_TOKEN}" ]]; then
            echo "RAILWAY_TOKEN is not configured." >&2
            exit 1
          fi
          if [[ -z "${RAILWAY_PROJECT_ID}" ]]; then
            echo "RAILWAY_PROJECT_ID is not configured." >&2
            exit 1
          fi
          if [[ -z "${SERVICE_ID}" ]]; then
            echo "Railway service ID for ${TARGET} is not configured." >&2
            exit 1
          fi
          if [[ -z "${RAILWAY_ENVIRONMENT}" ]]; then
            RAILWAY_ENVIRONMENT="production"
          fi

          echo "target=${TARGET}" >> "$GITHUB_OUTPUT"
          echo "service_id=${SERVICE_ID}" >> "$GITHUB_OUTPUT"
          echo "dockerfile_path=${DOCKERFILE_PATH}" >> "$GITHUB_OUTPUT"
          echo "environment=${RAILWAY_ENVIRONMENT}" >> "$GITHUB_OUTPUT"

      - name: Prepare Dockerfile for Railway build context
        shell: bash
        run: cp "${{ steps.target.outputs.dockerfile_path }}" Dockerfile

      - name: Deploy to Railway
        shell: bash
        run: |
          set -euo pipefail
          npm i -g @railway/cli@4.6.1
          railway up \
            --ci \
            --detach \
            --project "${RAILWAY_PROJECT_ID}" \
            --environment "${{ steps.target.outputs.environment }}" \
            --service "${{ steps.target.outputs.service_id }}" \
            --message "GitHub ${GITHUB_SHA} (${GITHUB_REF_NAME})" \
            .
